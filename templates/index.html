<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f8fafc;
            color: #1e293b;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT: CHART AREA */
        .chart-section {
            flex: 3;
            padding: 20px;
        }

        /* RIGHT: STOCK LIST */
        .sidebar {
            flex: 1;
            border-left: 1px solid #e2e8f0;
            background: white;
            overflow-y: auto;
        }

        .header {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            font-weight: bold;
        }

        .stock-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }

        .stock-item:hover {
            background: #f1f5f9;
        }

        .active {
            background: #e0f2fe;
        }

        /* FILTERS */
        .filters {
            margin-bottom: 15px;
        }

        select {
            padding: 6px;
            margin-right: 10px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="chart-section">
<div class="metrics">
    <div class="card">RSI: <span id="rsi"></span></div>
    <div class="card">EMA: <span id="ema"></span></div>
    <div class="card">MACD: <span id="macd"></span></div>
</div>

        <div class="filters">
            <select id="month">
                <option value="">Month</option>
                <option value="1">Jan</option>
                <option value="2">Feb</option>
                <option value="3">Mar</option>
                <option value="4">Apr</option>
                <option value="5">May</option>
                <option value="6">Jun</option>
                <option value="7">Jul</option>
                <option value="8">Aug</option>
                <option value="9">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
            </select>

            <select id="year">
                <option value="">Year</option>
                <option>2026</option>
                <option>2025</option>
                <option>2024</option>
            </select>

            <button onclick="reload()">Apply</button>
        </div>


        <h3 id="title">Select a stock</h3>

        <canvas id="chart" height="120"></canvas>

    </div>

    <!-- RIGHT SIDE -->
    <div class="sidebar">
        <div class="header">Stocks</div>
        <div id="stockList"></div>
    </div>

</div>

<script>
const API = window.location.origin;

let chart;
let selectedStock = null;

// =======================
// Load Stock List
// =======================
async function loadStocks() {
    const res = await fetch(`${API}/stocks`);
    const stocks = await res.json();

    const container = document.getElementById("stockList");

    stocks.forEach(s => {
        const div = document.createElement("div");
        div.className = "stock-item";
        div.innerText = s;

        div.onclick = () => selectStock(s, div);

        container.appendChild(div);
    });
}

// =======================
// Select Stock
// =======================
function selectStock(symbol, element) {
    selectedStock = symbol;

    document.querySelectorAll(".stock-item").forEach(el => el.classList.remove("active"));
    element.classList.add("active");

    loadChart();
}
// ====================
// Update UI
// ====================
function updateUI(data) {

    document.getElementById("rsi").innerText = data.rsi;
    document.getElementById("ema").innerText = data.ema;
    document.getElementById("macd").innerText = data.macd;
}

// =======================
// Load Chart
// =======================
const ws = new WebSocket(`ws://${location.host}/ws`);

function loadChart() {
    if (!selectedStock) return;

    const month = document.getElementById("month").value;
    const year = document.getElementById("year").value;

    ws.send(JSON.stringify({
        symbol: selectedStock,
        month: month,
        year: year
    }));
}

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
     if (!data || !data.prices) {
            console.warn("Invalid data format", data);
            drawChart({});
            updateUI({})
            return;
        }
    drawChart(data);
    updateUI(data)
};
// =======================
// Draw Chart
// =======================
function drawChart(data) {
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.dates,
            datasets: [
                {
                    label: "Price",
                    data: data.prices,
                    borderColor: "#2563eb",
                    tension: 0.3
                },
                {
                    label: "EMA",
                    data: data.ema_series,
                    borderColor: "#f59e0b"
                }
            ]
        }
    });
}

// =======================
// Reload with filters
// =======================
function reload() {
    loadChart();
}

// Init
loadStocks();
</script>

</body>
</html>
